name: Release

# Publish to npm when a v* tag is pushed, using npm trusted publishing (OIDC).
# No NPM_TOKEN secret: configure the package's "Trusted Publisher" on npmjs.com
# to this repo + workflow. Provenance is emitted automatically.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: npm
      # Trusted publishing needs npm >= 11.5.1 (newer than the bundled version).
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      # Idempotent: skip if this version is already on the registry (e.g. the
      # manual first publish). Subsequent version bumps publish via OIDC.
      - name: Publish to npm
        run: |
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "$NAME@$VERSION already published — skipping."
          else
            npm publish
          fi
